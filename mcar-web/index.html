<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mcar - 내차팔기 프리미엄 견적</title>
    <!-- Modern Font: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="logo">Mcar</div>
      <nav class="nav-links">
        <a href="#">내차사기</a>
        <a href="#" class="active">내차팔기</a>
        <a href="#">시세조회</a>
      </nav>
    </header>

    <!-- Hero Section -->
    <main class="hero">
      <div class="hero-content">
        <h1 class="hero-title">당신의 차, <br/><span class="highlight">가장 완벽한 가격</span>에.</h1>
        <p class="hero-subtitle">Mcar 프리미엄 비교견적으로 실시간 최고가를 확인하세요.</p>
        
        <button id="openModalBtn" class="cta-button">내차 견적을 안내드립니다</button>
      </div>
    </main>

    <!-- Modal Overlay (Hidden by default) -->
    <div id="sellCarModal" class="modal-overlay hidden">
      <div class="modal-content">
        <button id="closeModalBtn" class="close-btn" aria-label="닫기">×</button>
        <h2 class="modal-title">차량번호를 입력해주세요</h2>
        <p class="modal-desc">정확한 시세 확인을 위해 필요합니다.</p>
        
        <div class="input-group">
          <input type="text" id="carNumberInput" placeholder="123가4567" class="premium-input" />
          <button id="searchEstimateBtn" class="search-button">조회</button>
        </div>
        
        <!-- Error Message Placeholder -->
        <p id="errorMessage" class="error-message-class hidden"></p>
        
        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
          <div class="spinner"></div>
          <span>실시간 견적을 가져오는 중...</span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
