<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mcar - 견적 완료</title>
    <!-- Modern Font: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      :root {
        --bg-color: #0b0c10;
        --surface-color: #1f2833;
        --primary-color: #66fcf1;
        --text-light: #ffffff;
        --font-family: 'Pretendard', sans-serif;
      }
      body {
        margin: 0;
        font-family: var(--font-family);
        background: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 70%);
        color: var(--text-light);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      .result-container {
        background: rgba(31, 40, 51, 0.6);
        backdrop-filter: blur(20px);
        padding: 60px 40px;
        border-radius: 24px;
        border: 1px solid rgba(102, 252, 241, 0.2);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
        max-width: 500px;
        width: 90%;
        animation: fadeIn 0.8s ease-out;
      }
      .check-icon {
        width: 80px;
        height: 80px;
        background-color: rgba(102, 252, 241, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        color: var(--primary-color);
        font-size: 40px;
        border: 2px solid var(--primary-color);
        animation: scaleUp 0.5s ease-out 0.2s both;
      }
      .title {
        font-size: 2rem;
        margin-bottom: 16px;
        font-weight: 800;
      }
      .quote-amount {
        font-size: 3rem;
        color: var(--primary-color);
        font-weight: 900;
        margin-bottom: 32px;
        text-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
      }
      .back-button {
        background-color: transparent;
        color: var(--text-light);
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 12px 32px;
        border-radius: 50px;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
      }
      .back-button:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleUp {
        from { transform: scale(0); }
        to { transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div class="result-container">
      <div class="check-icon">✓</div>
      <div class="title">차량 견적이 완료되었습니다!</div>
      <div class="quote-amount">1,850만 원</div>
      <p style="margin-bottom: 32px; color: #c5c6c7;">Mcar 인증 딜러들이 실시간 입찰을 시작합니다.</p>
      <a href="/" class="back-button">메인으로 돌아가기</a>
    </div>
  </body>
</html>
